# Единицы измерения: миллиметры.
# Ряды перечислены снизу вверх.
# Переменные задаются в начале продукта в блоке vars и используются как @group.name.

activeProduct: wardrobe

materials:
  carcass: darkWalnut
  back: smokedOak
  door: darkWalnut
  openLight: warmLed
  baskets: metalMeshBlack
  rail: brushedSteel

products:
  - id: wardrobe
    name: Шкаф
    type: wardrobe

    vars:
      size:
        width, height, depth: 1700, 2750, 500
      thickness:
        default: 18
        sides: 18
        top: 18
        bottom: 18
        shelves: 18
        dividers: 18
        back: 6
        doors: 18
      rows:
        lower: 600
        shelf: 330
        upper: 830
      columns:
        left: 566
        main: 567
      baskets:
        height: 600
      rail:
        depthFromBack: 330

    dimensions:
      width, height, depth: @size.width, @size.height, @size.depth

    boardThickness:
      default: @thickness.default
      sides: @thickness.sides
      top: @thickness.top
      bottom: @thickness.bottom
      shelves: @thickness.shelves
      dividers: @thickness.dividers
      back: @thickness.back
      doors: @thickness.doors

    columns:
      - id: left-open
        width: @columns.left
      - id: main-left
        width: @columns.main
      - id: main-right
        width: @columns.main

    rows:
      - id: lower-left-door-and-baskets
        height: @rows.lower
      - id: open-shelf-1
        height: @rows.shelf
      - id: open-shelf-2
        height: @rows.shelf
      - id: open-shelf-3
        height: @rows.shelf
      - id: open-shelf-4
        height: @rows.shelf
      - id: upper-section
        height: @rows.upper

    verticalDividers:
      - id: left-main-divider
        colBoundary, fromFloor, toTop: 1, 0, @size.height
      - id: basket-center-divider
        colBoundary, fromFloor, toTop: 2, 0, @baskets.height
      - id: upper-center-divider
        colBoundary, fromFloor, toTop: 2, 1920, @size.height

    doors:
      - id: left-lower-door
        col, row, colSpan, rowSpan: 0, 0, 1, 1
        handle: right
      - id: left-upper-door
        col, row, colSpan, rowSpan: 0, 5, 1, 1
        handle: none
      - id: main-upper-left
        col, row, colSpan, rowSpan: 1, 5, 1, 1
        handle: none
        swing: left
      - id: main-upper-right
        col, row, colSpan, rowSpan: 2, 5, 1, 1
        handle: none
        swing: right
      - id: main-lower-left
        col, row, colSpan, rowSpan: 1, 0, 1, 5
        handle: center
        swing: left
      - id: main-lower-right
        col, row, colSpan, rowSpan: 2, 0, 1, 5
        handle: center
        swing: right

    openCells:
      - col, row: 0, 1
        items: books-vase
        light: true
      - col, row: 0, 2
        items: audio-vase
        light: true
      - col, row: 0, 3
        items: books-bowl
        light: true
      - col, row: 0, 4
        items: books-vase
        light: true

    internal:
      - id: left-upper-middle-shelf
        col, row, colSpan: 0, 5, 1
        type: shelf
        position: middle
      - id: main-upper-middle-shelf
        col, row, colSpan: 1, 5, 2
        type: shelf
        position: middle
      - id: divider-between-upper-and-main
        col, row, colSpan: 1, 5, 2
        type: shelf
        position: bottom
      - id: shelf-above-baskets
        col, row, colSpan: 1, 0, 2
        type: shelf
        heightFromFloor: @baskets.height
      - id: hanging-rail-above-baskets
        col, row, rowSpan, colSpan: 1, 1, 4, 2
        type: rail
        heightRatio: 0.9
        depthFromBack: @rail.depthFromBack
        material: brushedSteel

    baskets:
      rows, columns, colStart, colSpan: 3, 2, 1, 2
      heightFromFloorToTop: @baskets.height
      material: metalMeshBlack

  - id: console
    name: Консоль
    type: console

    vars:
      size:
        width, height, depth: 2300, 300, 450
      section:
        width: 575
      position:
        floorOffset: 150
      panel:
        width, height, thickness: 2300, 3000, 20
        bottomFromFloor: 450
      tv:
        width, height, thickness: 1450, 830, 20
        bottomFromFloor: 900
      mesh:
        cellSize: 50
      cutout:
        clearanceDepth: 10
      thickness:
        default: 18
        sides: 18
        top: 18
        bottom: 18
        shelves: 18
        dividers: 18
        back: 6
        doors: 18

    dimensions:
      width, height, depth: @size.width, @size.height, @size.depth

    boardThickness:
      default: @thickness.default
      sides: @thickness.sides
      top: @thickness.top
      bottom: @thickness.bottom
      shelves: @thickness.shelves
      dividers: @thickness.dividers
      back: @thickness.back
      doors: @thickness.doors

    position:
      floorOffset: @position.floorOffset

    boardTypes:
      bottom:
        type, cellSize: latticeX, @mesh.cellSize
        col, colSpan: 1, 2

    decorativeElements:
      - id: console-wall-panel
        type: wallPanel
        width, height, thickness: @panel.width, @panel.height, @panel.thickness
        bottomFromFloor: @panel.bottomFromFloor
        material: smokedOak
      - id: tv-65
        type: tv
        width, height, thickness: @tv.width, @tv.height, @tv.thickness
        bottomFromFloor: @tv.bottomFromFloor
        material: blackMetal

    columns:
      - id: section-1
        width: @section.width
      - id: section-2
        width: @section.width
      - id: section-3
        width: @section.width
      - id: section-4
        width: @section.width

    rows:
      - id: body
        height: @size.height

    verticalDividers:
      - id: divider-1
        colBoundary, fromFloor, toTop: 1, 0, @size.height
      - id: divider-2
        colBoundary, fromFloor, toTop: 2, 0, @size.height
      - id: divider-3
        colBoundary, fromFloor, toTop: 3, 0, @size.height

    topCutouts:
      - id: wire-cutout
        col, colSpan, clearanceDepth: 1, 2, @cutout.clearanceDepth

    doors:
      - id: console-door-1
        col, row, colSpan, rowSpan: 0, 0, 1, 1
        handle: none
      - id: console-door-2
        col, row, colSpan, rowSpan: 1, 0, 1, 1
        handle: none
        swing: left
      - id: console-door-3
        col, row, colSpan, rowSpan: 2, 0, 1, 1
        handle: none
        swing: right
      - id: console-door-4
        col, row, colSpan, rowSpan: 3, 0, 1, 1
        handle: none
        swing: right

    openCells:
      - col, row: 1, 0
      - col, row: 2, 0

    internal:
      - id: console-shelf-1
        col, row, colSpan: 0, 0, 1
        type: shelf
        position: middle
      - id: console-shelf-2
        col, row, colSpan: 1, 0, 2
        type: shelf
        position: middle
        boardType: &meshShelf
          type, cellSize: latticeX, @mesh.cellSize
      - id: console-shelf-4
        col, row, colSpan: 3, 0, 1
        type: shelf
        position: middle

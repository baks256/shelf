# Единицы измерения: миллиметры.
# Ряды перечислены снизу вверх.
# Переменные задаются в начале продукта в блоке vars и используются как @group.name.

activeProduct: wardrobe

materials:
  carcass: darkWalnut
  back: smokedOak
  door: darkWalnut
  openLight: warmLed
  baskets: metalMeshBlack
  rail: brushedSteel

products:
  - id: wardrobe
    name: Шкаф
    type: wardrobe

    vars:
      size:
        width: 1700
        height: 2750
        depth: 500
      thickness:
        default: 18
        sides: 18
        top: 18
        bottom: 18
        shelves: 18
        dividers: 18
        back: 6
        doors: 18
      rows:
        lower: 600
        shelf: 330
        upper: 830
      columns:
        left: 566
        main: 567
      baskets:
        height: 600
      rail:
        depthFromBack: 330

    dimensions:
      width: @size.width
      height: @size.height
      depth: @size.depth

    boardThickness:
      default: @thickness.default
      sides: @thickness.sides
      top: @thickness.top
      bottom: @thickness.bottom
      shelves: @thickness.shelves
      dividers: @thickness.dividers
      back: @thickness.back
      doors: @thickness.doors

    columns:
      - id: left-open
        width: @columns.left
      - id: main-left
        width: @columns.main
      - id: main-right
        width: @columns.main

    rows:
      - id: lower-left-door-and-baskets
        height: @rows.lower
      - id: open-shelf-1
        height: @rows.shelf
      - id: open-shelf-2
        height: @rows.shelf
      - id: open-shelf-3
        height: @rows.shelf
      - id: open-shelf-4
        height: @rows.shelf
      - id: upper-section
        height: @rows.upper

    verticalDividers:
      - id: left-main-divider
        colBoundary: 1
        fromFloor: 0
        toTop: @size.height
      - id: basket-center-divider
        colBoundary: 2
        fromFloor: 0
        toTop: @baskets.height
      - id: upper-center-divider
        colBoundary: 2
        fromFloor: 1920
        toTop: @size.height

    doors:
      - id: left-lower-door
        col: 0
        row: 0
        colSpan: 1
        rowSpan: 1
        handle: right
      - id: left-upper-door
        col: 0
        row: 5
        colSpan: 1
        rowSpan: 1
        handle: none
      - id: main-upper-left
        col: 1
        row: 5
        colSpan: 1
        rowSpan: 1
        handle: none
        swing: left
      - id: main-upper-right
        col: 2
        row: 5
        colSpan: 1
        rowSpan: 1
        handle: none
        swing: right
      - id: main-lower-left
        col: 1
        row: 0
        colSpan: 1
        rowSpan: 5
        handle: center
        swing: left
      - id: main-lower-right
        col: 2
        row: 0
        colSpan: 1
        rowSpan: 5
        handle: center
        swing: right

    openCells:
      - col: 0
        row: 1
        items: books-vase
        light: true
      - col: 0
        row: 2
        items: audio-vase
        light: true
      - col: 0
        row: 3
        items: books-bowl
        light: true
      - col: 0
        row: 4
        items: books-vase
        light: true

    internal:
      - id: left-upper-middle-shelf
        col: 0
        row: 5
        colSpan: 1
        type: shelf
        position: middle
      - id: main-upper-middle-shelf
        col: 1
        row: 5
        colSpan: 2
        type: shelf
        position: middle
      - id: divider-between-upper-and-main
        col: 1
        row: 5
        colSpan: 2
        type: shelf
        position: bottom
      - id: shelf-above-baskets
        col: 1
        row: 0
        colSpan: 2
        type: shelf
        heightFromFloor: @baskets.height
      - id: hanging-rail-above-baskets
        col: 1
        row: 1
        rowSpan: 4
        colSpan: 2
        type: rail
        heightRatio: 0.9
        depthFromBack: @rail.depthFromBack
        material: brushedSteel

    baskets:
      rows: 3
      columns: 2
      colStart: 1
      colSpan: 2
      heightFromFloorToTop: @baskets.height
      material: metalMeshBlack

  - id: console
    name: Консоль
    type: console

    vars:
      size:
        width: 2300
        height: 300
        depth: 450
      section:
        width: 575
      position:
        floorOffset: 150
      panel:
        width: 2300
        height: 3000
        thickness: 20
        bottomFromFloor: 450
      tv:
        width: 1450
        height: 830
        thickness: 20
        bottomFromFloor: 900
      mesh:
        cellSize: 50
      cutout:
        clearanceDepth: 10
      thickness:
        default: 18
        sides: 18
        top: 18
        bottom: 18
        shelves: 18
        dividers: 18
        back: 6
        doors: 18

    dimensions:
      width: @size.width
      height: @size.height
      depth: @size.depth

    boardThickness:
      default: @thickness.default
      sides: @thickness.sides
      top: @thickness.top
      bottom: @thickness.bottom
      shelves: @thickness.shelves
      dividers: @thickness.dividers
      back: @thickness.back
      doors: @thickness.doors

    position:
      floorOffset: @position.floorOffset

    boardTypes:
      bottom:
        type: latticeX
        cellSize: @mesh.cellSize

    decorativeElements:
      - id: console-wall-panel
        type: wallPanel
        width: @panel.width
        height: @panel.height
        thickness: @panel.thickness
        bottomFromFloor: @panel.bottomFromFloor
        material: smokedOak
      - id: tv-65
        type: tv
        width: @tv.width
        height: @tv.height
        thickness: @tv.thickness
        bottomFromFloor: @tv.bottomFromFloor
        material: blackMetal

    columns:
      - id: section-1
        width: @section.width
      - id: section-2
        width: @section.width
      - id: section-3
        width: @section.width
      - id: section-4
        width: @section.width

    rows:
      - id: body
        height: @size.height

    verticalDividers:
      - id: divider-1
        colBoundary: 1
        fromFloor: 0
        toTop: @size.height
      - id: divider-2
        colBoundary: 2
        fromFloor: 0
        toTop: @size.height
      - id: divider-3
        colBoundary: 3
        fromFloor: 0
        toTop: @size.height

    topCutouts:
      - id: wire-cutout
        col: 1
        colSpan: 2
        clearanceDepth: @cutout.clearanceDepth

    doors:
      - id: console-door-1
        col: 0
        row: 0
        colSpan: 1
        rowSpan: 1
        handle: none
      - id: console-door-2
        col: 1
        row: 0
        colSpan: 1
        rowSpan: 1
        handle: none
        swing: left
      - id: console-door-3
        col: 2
        row: 0
        colSpan: 1
        rowSpan: 1
        handle: none
        swing: right
      - id: console-door-4
        col: 3
        row: 0
        colSpan: 1
        rowSpan: 1
        handle: none
        swing: right

    openCells:
      - col: 1
        row: 0
      - col: 2
        row: 0

    internal:
      - id: console-shelf-1
        col: 0
        row: 0
        colSpan: 1
        type: shelf
        position: middle
        boardType: &meshShelf
          type: latticeX
          cellSize: @mesh.cellSize
      - id: console-shelf-2
        col: 1
        row: 0
        colSpan: 1
        type: shelf
        position: middle
        boardType: *meshShelf
      - id: console-shelf-3
        col: 2
        row: 0
        colSpan: 1
        type: shelf
        position: middle
        boardType: *meshShelf
      - id: console-shelf-4
        col: 3
        row: 0
        colSpan: 1
        type: shelf
        position: middle
        boardType: *meshShelf
